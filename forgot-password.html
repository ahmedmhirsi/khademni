<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password — Khademni</title>
    <meta name="description"
        content="Reset your Khademni password. Enter your email and we'll send you a link to reset it." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="auth.css" />
</head>

<body>

    <div class="auth-page">
        <div class="hero__bg-shapes">
            <div class="shape shape--1"></div>
            <div class="shape shape--2"></div>
        </div>

        <div class="auth-container">
            <div class="auth-card">

                <div class="auth-card__logo">
                    <a href="index.html" style="display:flex;align-items:center;gap:10px;">
                        <span class="logo-icon"><i class="fas fa-briefcase"></i></span>
                        Khademni
                    </a>
                </div>

                <h1 class="auth-card__title">Forgot Password?</h1>
                <p class="auth-card__subtitle">Enter your email and we'll send you a reset link</p>

                <div class="alert" id="forgotAlert"></div>

                <form id="forgotForm" novalidate>
                    <div class="form-group">
                        <label for="email">Email address <span class="required">*</span></label>
                        <div class="form-input-icon">
                            <input type="email" id="email" class="form-input" placeholder="your@email.com"
                                autocomplete="email" />
                            <i class="fas fa-envelope"></i>
                        </div>
                        <div class="form-error" id="email-error"></div>
                    </div>

                    <button type="submit" class="btn btn--primary btn--lg btn--block">
                        <i class="fas fa-paper-plane"></i> Send Reset Link
                    </button>
                </form>

                <p class="auth-footer" style="margin-top:20px;">
                    <a href="login.html"><i class="fas fa-arrow-left"></i> Back to Login</a>
                </p>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
</body>

</html>
